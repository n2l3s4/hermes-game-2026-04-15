<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobo's Monster Band! 🎵</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(180deg, #2d1b4e 0%, #1a0f2e 100%);
  font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
}
#gameCanvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#muteBtn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 56px;
  height: 56px;
  border: none;
  border-radius: 50%;
  background: #ff9f1c;
  color: #fff;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 4px 0 #cc7a00;
  transition: transform 0.1s;
  z-index: 10;
}
#muteBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #cc7a00; }
#instructions {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  color: #ffe6a7;
  font-size: 18px;
  text-align: center;
  pointer-events: none;
  text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  z-index: 10;
}
</style>
</head>
<body>
<button id="muteBtn" aria-label="Mute">🔊</button>
<canvas id="gameCanvas"></canvas>
<div id="instructions">Watch the monsters sing, then repeat the pattern! 🎵</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
window.addEventListener('resize', resize); resize();

// Audio
let audioCtx = null;
let muted = false;
const muteBtn = document.getElementById('muteBtn');

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol=0.2, when=0) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function playNoteForMonster(id) {
  const notes = {
    red:    {f: 523, t: 'sine'},
    blue:   {f: 659, t: 'triangle'},
    green:  {f: 784, t: 'sine'},
    yellow: {f: 1047, t: 'triangle'}
  };
  const n = notes[id];
  if (!n) return;
  playTone(n.f, n.t, 0.35, 0.25);
  playTone(n.f * 1.5, 'sine', 0.3, 0.08, 0.05);
}

function playWinMusic() {
  if (muted || !audioCtx) return;
  const melody = [523, 659, 784, 1047, 784, 1047, 1175, 1047];
  melody.forEach((f, i) => playTone(f, 'triangle', 0.35, 0.12, i * 0.18));
}

function playErrorSound() {
  if (muted || !audioCtx) return;
  playTone(150, 'sawtooth', 0.3, 0.15);
  playTone(120, 'sawtooth', 0.3, 0.12, 0.15);
}

muteBtn.addEventListener('click', () => {
  initAudio();
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
});

// Input handling
let inputLocked = true;
window.addEventListener('mousedown', e => {
  initAudio();
  if (e.target.id === 'muteBtn') return;
  handleInput(e.clientX, e.clientY);
});
window.addEventListener('touchstart', e => {
  initAudio();
  if (e.target.id === 'muteBtn') return;
  handleInput(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});

// Game state
const TOTAL_ROUNDS = 5;
let round = 1;
let pattern = [];
let playerIndex = 0;
let gameState = 'start';
let lastT = performance.now();
let showTimer = 0;
let showIndex = -1;

const monsters = [];
function initMonsters() {
  const cx = W/2, cy = H/2 - 20;
  const r = Math.min(W, H) * 0.28;
  monsters.length = 0;
  monsters.push({id:'red',    x: cx,       y: cy - r,     color:'#FF6B6B', glow:'#FFB4B4', shape:'circle', emoji:'🥁'});
  monsters.push({id:'blue',   x: cx + r,   y: cy,         color:'#4D96FF', glow:'#A8D0FF', shape:'square', emoji:'🎸'});
  monsters.push({id:'green',  x: cx,       y: cy + r,     color:'#6BCB77', glow:'#B4E8BA', shape:'triangle', emoji:'🎹'});
  monsters.push({id:'yellow', x: cx - r,   y: cy,         color:'#FFD93D', glow:'#FFEC9B', shape:'star', emoji:'🎺'});
}
initMonsters();

function randInt(n) { return Math.floor(Math.random() * n); }

function buildPattern() {
  pattern = [];
  for (let i = 0; i < round; i++) {
    pattern.push(randInt(4));
  }
  playerIndex = 0;
  showIndex = -1;
  showTimer = 0;
  inputLocked = true;
  gameState = 'show';
}

function startGame() {
  round = 1;
  buildPattern();
}

function endGame() {
  gameState = 'won';
  playWinMusic();
}

function handleInput(mx, my) {
  if (gameState === 'start') {
    startGame();
    return;
  }
  if (gameState === 'won') {
    startGame();
    return;
  }
  if (gameState !== 'play' || inputLocked) return;

  for (let m of monsters) {
    const dx = mx - m.x, dy = my - m.y;
    if (Math.hypot(dx, dy) < 55) {
      checkMonster(m);
      return;
    }
  }
}

function checkMonster(m) {
  const expected = monsters[pattern[playerIndex]];
  if (m.id === expected.id) {
    m.flash = 1;
    playNoteForMonster(m.id);
    playerIndex++;
    if (playerIndex >= pattern.length) {
      inputLocked = true;
      if (round >= TOTAL_ROUNDS) {
        setTimeout(endGame, 600);
      } else {
        setTimeout(() => { round++; buildPattern(); }, 800);
      }
    }
  } else {
    playErrorSound();
    m.shake = 10;
  }
}

function update(dt) {
  if (gameState === 'show') {
    showTimer += dt;
    if (showTimer > 0.85) {
      showTimer = 0;
      showIndex++;
      if (showIndex < pattern.length) {
        const m = monsters[pattern[showIndex]];
        m.flash = 1;
        playNoteForMonster(m.id);
      } else {
        gameState = 'play';
        inputLocked = false;
      }
    }
  }

  for (let m of monsters) {
    if (m.flash > 0) m.flash -= dt * 2.5;
    if (m.flash < 0) m.flash = 0;
    if (m.shake > 0) m.shake -= dt * 15;
    if (m.shake < 0) m.shake = 0;
  }
}

function drawMonster(m) {
  const flashScale = 1 + (m.flash || 0) * 0.15;
  const glowSize = 20 + (m.flash || 0) * 40;
  const dx = (m.shake || 0) > 0 ? Math.sin((m.shake || 0) * 3) * 6 : 0;
  const x = m.x + dx;
  const y = m.y;

  // Glow
  const g = ctx.createRadialGradient(x, y, 10, x, y, 55 + glowSize);
  g.addColorStop(0, m.color);
  g.addColorStop(0.4, `rgba(${hexToRgb(m.color)}, ${0.3 + (m.flash || 0) * 0.5})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, 55 + glowSize, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = m.color;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4;

  const size = 50 * flashScale;
  if (m.shape === 'circle') {
    ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  } else if (m.shape === 'square') {
    ctx.beginPath(); ctx.roundRect(x - size, y - size, size*2, size*2, 18); ctx.fill(); ctx.stroke();
  } else if (m.shape === 'triangle') {
    ctx.beginPath();
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + size*0.9, y + size*0.8);
    ctx.lineTo(x - size*0.9, y + size*0.8);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (m.shape === 'star') {
    drawStar(x, y, 5, size, size*0.5);
    ctx.fill(); ctx.stroke();
  }

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 14, y - 8, 10, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 14, y - 8, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  const shakeOffX = (m.shake || 0) > 0 ? 2 : 0;
  ctx.beginPath(); ctx.arc(x - 14 + shakeOffX, y - 6, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 14 - shakeOffX, y - 6, 5, 0, Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y + 8, 12, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // Instrument emoji
  ctx.font = 'bold ' + (28 * flashScale) + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(m.emoji, x, y + size + 22);
}

function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
  let rot = Math.PI / 2 * 3;
  let x = cx;
  let y = cy;
  let step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerRadius);
  for (let i = 0; i < spikes; i++) {
    x = cx + Math.cos(rot) * outerRadius;
    y = cy + Math.sin(rot) * outerRadius;
    ctx.lineTo(x, y);
    rot += step;
    x = cx + Math.cos(rot) * innerRadius;
    y = cy + Math.sin(rot) * innerRadius;
    ctx.lineTo(x, y);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerRadius);
  ctx.closePath();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r},${g},${b}`;
}

function draw() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#2d1b4e');
  grad.addColorStop(1, '#1a0f2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sparkles
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 30; i++) {
    const px = ((i * 137.5) % W);
    const py = ((i * 73.3) % H);
    const a = 0.3 + Math.sin(performance.now() * 0.002 + i) * 0.25;
    ctx.globalAlpha = Math.max(0.05, a);
    ctx.beginPath(); ctx.arc(px, py, 1.5 + (i%3), 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Monsters
  for (let m of monsters) drawMonster(m);

  // UI
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Comic Sans MS, sans-serif';
  if (gameState !== 'start') {
    ctx.fillText('🎵 Round ' + round + ' / ' + TOTAL_ROUNDS, W/2, 18);
  }

  if (gameState === 'start') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff9f1c';
    ctx.font = 'bold ' + Math.min(72, W/7) + 'px Comic Sans MS, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText("Bobo's Monster Band!", W/2, H/2 - 40);
    ctx.fillStyle = '#ffe6a7';
    ctx.font = 'bold ' + Math.min(28, W/18) + 'px Comic Sans MS, sans-serif';
    ctx.fillText('Click anywhere to start! 🥁🎸🎹🎺', W/2, H/2 + 35);
  } else if (gameState === 'show') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffe6a7';
    ctx.font = 'bold ' + Math.min(40, W/10) + 'px Comic Sans MS, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Listen... 🎧', W/2, H/2);
  } else if (gameState === 'won') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff9f1c';
    ctx.font = 'bold ' + Math.min(80, W/7) + 'px Comic Sans MS, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Good Game, Bobo!', W/2, H/2 - 30);
    ctx.fillStyle = '#ffe6a7';
    ctx.font = 'bold ' + Math.min(32, W/16) + 'px Comic Sans MS, sans-serif';
    ctx.fillText('You are a rock star! 🎸🌟', W/2, H/2 + 50);
  }
}

function loop(now) {
  const dt = (now - lastT) / 1000;
  lastT = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
